  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0dc5d4f3-6fc5-4eb6-ae48-8452eb8ba277\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f91d43e0-89c5-4a4d-987c-8cad1768dd6e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;height:100%}\n  body{font-family:'Hanken Grotesk',sans-serif;-webkit-font-smoothing:antialiased;color:#1E1C18;background:#0A271D}\n  a{color:#14543E}a:hover{color:#0F4733}\n  @keyframes aaIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n  @keyframes aaToast{0%{opacity:0;transform:translate(-50%,12px)}12%{opacity:1;transform:translate(-50%,0)}88%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-6px)}}\n  @keyframes aaDrop{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}\n  @keyframes aaPulse{0%,100%{opacity:1}50%{opacity:.4}}\n  @keyframes aaSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}\n  .scr{flex:1;overflow:auto;animation:aaIn .26s ease}\n  .scr::-webkit-scrollbar{width:0}\n  .ai{width:100%;border:1px solid #D9CFBD;border-radius:10px;padding:10px 11px;font:500 13px 'Hanken Grotesk';background:#fff;color:#1E1C18;outline:none}\n  .ai:focus{border-color:#14543E}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Aarogya Solo\" class=\"app-shell\" style=\"position:relative;width:100%;max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#F4F0E8;font-family:'Hanken Grotesk',sans-serif;overflow:hidden\">\n\n      <!-- ============ LOGIN ============ -->\n      <sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"scr\" data-screen-label=\"Login\" style=\"display:flex;flex-direction:column;justify-content:center;padding:44px 26px;background:#F4F0E8\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:28px\">\n            <div style=\"width:42px;height:42px;border-radius:13px;background:#E8913A;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0F4733\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 21c0-5 0-8 0-12\"><\u002Fpath><path d=\"M12 9c-3.2 0-5-2-5-5 3.2 0 5 2 5 5Z\"><\u002Fpath><path d=\"M12 11c3.2 0 5-2 5-5-3.2 0-5 2-5 5Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"font:700 20px 'Bricolage Grotesque';color:#14543E\">Aarogya<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font:700 22px/1.25 'Bricolage Grotesque';margin-bottom:6px\">Let's get you started<\u002Fdiv>\n          <div style=\"font:400 12.5px/1.5 'Hanken Grotesk';color:#857d70;margin-bottom:22px\">Enter your phone number — we'll text you a one-time code to verify it's you.<\u002Fdiv>\n          <div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70;margin-bottom:6px\">Phone number<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:20px\">\n            <div style=\"flex:none;padding:11px 12px;border:1px solid #D9CFBD;border-radius:10px;font:600 13px 'Hanken Grotesk';background:#fff\">+91<\u002Fdiv>\n            <input class=\"ai\" style=\"flex:1\" type=\"tel\" inputmode=\"numeric\" placeholder=\"98765 43210\" value=\"{{ authPhone }}\" oninput=\"{{ onAuthPhone }}\">\n          <\u002Fdiv>\n          <div onclick=\"{{ sendOtp }}\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;background:#14543E;color:#fff;border-radius:13px;padding:14px;font:700 14px 'Hanken Grotesk';cursor:pointer\" style-hover=\"background:#0F4733\">Send OTP<\u002Fdiv>\n          <div style=\"font:400 10.5px/1.5 'Hanken Grotesk';color:#A39A8A;margin-top:16px;text-align:center\">By continuing you agree this app provides general fitness guidance only — not medical advice.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ OTP ============ -->\n      <sc-if value=\"{{ isOtp }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"scr\" data-screen-label=\"Verify OTP\" style=\"display:flex;flex-direction:column;justify-content:center;padding:44px 26px;background:#F4F0E8\">\n          <div onclick=\"{{ changeNumber }}\" style=\"display:flex;align-items:center;gap:9px;margin-bottom:24px;cursor:pointer;color:#857d70\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#857d70\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 5l-7 7 7 7\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font:600 12px 'Hanken Grotesk'\">Change number<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font:700 22px/1.25 'Bricolage Grotesque';margin-bottom:6px\">Verify your number<\u002Fdiv>\n          <div style=\"font:400 12.5px/1.5 'Hanken Grotesk';color:#857d70;margin-bottom:4px\">Enter the 4-digit code sent to <b>+91 {{ authPhone }}<\u002Fb>.<\u002Fdiv>\n          <div style=\"font:500 11px 'Geist Mono';color:#E8913A;margin-bottom:20px\">Demo code: 1234<\u002Fdiv>\n          <input class=\"ai\" style=\"text-align:center;letter-spacing:.6em;font-size:20px;font-weight:700;margin-bottom:18px;padding:12px\" type=\"tel\" inputmode=\"numeric\" placeholder=\"••••\" value=\"{{ authOtp }}\" oninput=\"{{ onAuthOtp }}\">\n          <div onclick=\"{{ verifyOtp }}\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;background:#14543E;color:#fff;border-radius:13px;padding:14px;font:700 14px 'Hanken Grotesk';cursor:pointer\" style-hover=\"background:#0F4733\">Verify &amp; continue<\u002Fdiv>\n          <div onclick=\"{{ resendOtp }}\" style=\"text-align:center;margin-top:14px;font:600 12px 'Hanken Grotesk';color:#14543E;cursor:pointer\">Resend code<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ ONBOARDING: GOAL ============ -->\n      <sc-if value=\"{{ isGoalSelect }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"scr\" data-screen-label=\"Goal\">\n          <div style=\"padding:54px 18px 18px;background:#14543E;color:#F4EFE6;border-radius:0 0 22px 22px\">\n            <div style=\"font:600 10.5px 'Geist Mono';color:#A9C6B5;letter-spacing:.08em;margin-bottom:8px\">STEP 1 OF 2<\u002Fdiv>\n            <div style=\"font:700 22px/1.2 'Bricolage Grotesque'\">What's your primary goal?<\u002Fdiv>\n            <div style=\"font:400 12px/1.4 'Hanken Grotesk';color:#A9C6B5;margin-top:6px\">This shapes every workout and meal we build for you.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:18px 16px 120px;display:flex;flex-direction:column;gap:11px\">\n            <sc-for list=\"{{ onboardGoalCards }}\" as=\"g\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ g.onPick }}\" style=\"display:flex;align-items:center;gap:13px;background:{{ g.bg }};border:1.5px solid {{ g.border }};border-radius:16px;padding:15px;cursor:pointer\">\n                <div style=\"flex:1\"><div style=\"font:700 15px 'Hanken Grotesk';color:{{ g.titleColor }}\">{{ g.label }}<\u002Fdiv><div style=\"font:400 11.5px/1.4 'Hanken Grotesk';color:#857d70;margin-top:2px\">{{ g.desc }}<\u002Fdiv><\u002Fdiv>\n                <sc-if value=\"{{ g.picked }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#14543E\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"m8.5 12 2.5 2.5 4.5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid #ECE4D7;padding:12px 16px 30px;z-index:40\">\n          <div onclick=\"{{ continueGoal }}\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;background:#14543E;color:#fff;border-radius:13px;padding:14px;font:700 14px 'Hanken Grotesk';cursor:pointer\" style-hover=\"background:#0F4733\">Continue<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ ONBOARDING: BODY INFO ============ -->\n      <sc-if value=\"{{ isBodyInfo }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"scr\" data-screen-label=\"Body info\">\n          <div style=\"padding:54px 18px 18px;background:#14543E;color:#F4EFE6;border-radius:0 0 22px 22px\">\n            <div style=\"font:600 10.5px 'Geist Mono';color:#A9C6B5;letter-spacing:.08em;margin-bottom:8px\">STEP 2 OF 2<\u002Fdiv>\n            <div style=\"font:700 22px/1.2 'Bricolage Grotesque'\">Tell us about your body<\u002Fdiv>\n            <div style=\"font:400 12px/1.4 'Hanken Grotesk';color:#A9C6B5;margin-top:6px\">Only weight, height, age, gender &amp; activity are required — add full measurements if you have them.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:16px 16px 160px\">\n            <div style=\"display:flex;gap:8px;margin-bottom:14px\">\n              <div style=\"flex:1\"><div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70;margin-bottom:4px\">Weight (kg)*<\u002Fdiv><input class=\"ai\" type=\"number\" inputmode=\"decimal\" placeholder=\"78\" value=\"{{ bfWeight }}\" oninput=\"{{ onBfWeight }}\"><\u002Fdiv>\n              <div style=\"flex:1\"><div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70;margin-bottom:4px\">Height (cm)*<\u002Fdiv><input class=\"ai\" type=\"number\" inputmode=\"decimal\" placeholder=\"175\" value=\"{{ bfHeight }}\" oninput=\"{{ onBfHeight }}\"><\u002Fdiv>\n              <div style=\"flex:1\"><div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70;margin-bottom:4px\">Age*<\u002Fdiv><input class=\"ai\" type=\"number\" inputmode=\"numeric\" placeholder=\"28\" value=\"{{ bfAge }}\" oninput=\"{{ onBfAge }}\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font:600 12px 'Hanken Grotesk';margin-bottom:8px\">Gender*<\u002Fdiv>\n            <div style=\"display:flex;gap:8px;margin-bottom:16px\">\n              <sc-for list=\"{{ genderChips }}\" as=\"gc\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ gc.onPick }}\" style=\"flex:1;text-align:center;padding:10px 6px;border-radius:12px;cursor:pointer;border:1.5px solid {{ gc.border }};background:{{ gc.bg }};font:600 12.5px 'Hanken Grotesk';color:{{ gc.color }}\">{{ gc.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font:600 12px 'Hanken Grotesk';margin-bottom:8px\">Activity level*<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:16px\">\n              <sc-for list=\"{{ activityChips }}\" as=\"ac\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ ac.onPick }}\" style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:12px;cursor:pointer;border:1.5px solid {{ ac.border }};background:{{ ac.bg }}\">\n                  <div><div style=\"font:600 12.5px 'Hanken Grotesk';color:{{ ac.color }}\">{{ ac.label }}<\u002Fdiv><div style=\"font:400 10.5px 'Hanken Grotesk';color:#857d70;margin-top:2px\">{{ ac.desc }}<\u002Fdiv><\u002Fdiv>\n                  <sc-if value=\"{{ ac.picked }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#14543E\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"m8.5 12 2.5 2.5 4.5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div onclick=\"{{ toggleDetailed }}\" style=\"display:flex;align-items:center;gap:9px;margin-bottom:12px;cursor:pointer\">\n              <div style=\"width:20px;height:20px;border-radius:6px;border:1.5px solid #14543E;background:{{ detailedCheckBg }};display:flex;align-items:center;justify-content:center;flex:none\">\n                <sc-if value=\"{{ bfDetailed }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font:500 12.5px 'Hanken Grotesk'\">I know my detailed body measurements &amp; body fat %<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ bfDetailed }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:13px;margin-bottom:14px\">\n                <div style=\"margin-bottom:9px\"><div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70;margin-bottom:4px\">Body fat (%)<\u002Fdiv><input class=\"ai\" type=\"number\" inputmode=\"decimal\" placeholder=\"24\" value=\"{{ bfBodyFat }}\" oninput=\"{{ onBfBodyFat }}\"><\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px\">\n                  <div><div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70;margin-bottom:4px\">Chest (cm)<\u002Fdiv><input class=\"ai\" type=\"number\" inputmode=\"decimal\" placeholder=\"102\" value=\"{{ bfChest }}\" oninput=\"{{ onBfChest }}\"><\u002Fdiv>\n                  <div><div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70;margin-bottom:4px\">Waist (cm)<\u002Fdiv><input class=\"ai\" type=\"number\" inputmode=\"decimal\" placeholder=\"88\" value=\"{{ bfWaist }}\" oninput=\"{{ onBfWaist }}\"><\u002Fdiv>\n                  <div><div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70;margin-bottom:4px\">Arms (cm)<\u002Fdiv><input class=\"ai\" type=\"number\" inputmode=\"decimal\" placeholder=\"35\" value=\"{{ bfArms }}\" oninput=\"{{ onBfArms }}\"><\u002Fdiv>\n                  <div><div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70;margin-bottom:4px\">Thighs (cm)<\u002Fdiv><input class=\"ai\" type=\"number\" inputmode=\"decimal\" placeholder=\"58\" value=\"{{ bfThighs }}\" oninput=\"{{ onBfThighs }}\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div onclick=\"{{ toggleAgree }}\" style=\"display:flex;align-items:flex-start;gap:9px;background:#FBEFD9;border:1px solid #F0DBB6;border-radius:13px;padding:12px;cursor:pointer\">\n              <div style=\"width:20px;height:20px;border-radius:6px;border:1.5px solid #B97216;background:{{ agreeCheckBg }};display:flex;align-items:center;justify-content:center;flex:none;margin-top:1px\">\n                <sc-if value=\"{{ bfAgree }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font:500 11.5px/1.5 'Hanken Grotesk';color:#6E4A12\">All workout and diet recommendations are for general guidance only. Please consult a qualified doctor, dietitian &amp; certified personal trainer before starting or making significant changes to your program.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid #ECE4D7;padding:12px 16px 30px;z-index:40\">\n          <div onclick=\"{{ submitBodyInfo }}\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;background:#14543E;color:#fff;border-radius:13px;padding:14px;font:700 14px 'Hanken Grotesk';cursor:pointer\" style-hover=\"background:#0F4733\">Generate my plan<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ HOME ============ -->\n      <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"scr\" data-screen-label=\"Home\">\n          <div style=\"padding:58px 18px 16px;background:#14543E;color:#F4EFE6;border-radius:0 0 22px 22px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between\">\n              <div><div style=\"font:500 12px/1 'Hanken Grotesk';color:#A9C6B5\">{{ todayLabel }}<\u002Fdiv><div style=\"font:700 22px/1.15 'Bricolage Grotesque';margin-top:4px\">{{ greeting }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"width:36px;height:36px;border-radius:11px;background:#E8913A;color:#0F4733;display:flex;align-items:center;justify-content:center;font:700 14px 'Hanken Grotesk'\">AR<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:9px;margin-top:16px\">\n              <div style=\"flex:1;background:rgba(232,145,58,.18);border:1px solid rgba(232,145,58,.34);border-radius:12px;padding:9px 11px\"><div style=\"font:700 19px/1 'Bricolage Grotesque';color:#F4CF9F\">🔥 {{ streak }}<\u002Fdiv><div style=\"font:400 10.5px/1.2 'Hanken Grotesk';color:#F4CF9F;margin-top:3px\">Day streak<\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:1;background:rgba(244,239,230,.1);border:1px solid rgba(244,239,230,.16);border-radius:12px;padding:9px 11px\"><div style=\"font:700 19px/1 'Bricolage Grotesque'\">{{ totalGymDays }}<\u002Fdiv><div style=\"font:400 10.5px/1.2 'Hanken Grotesk';color:#A9C6B5;margin-top:3px\">Gym days<\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:1;background:rgba(244,239,230,.1);border:1px solid rgba(244,239,230,.16);border-radius:12px;padding:9px 11px\"><div style=\"font:700 19px/1 'Bricolage Grotesque'\">{{ adherence }}<\u002Fdiv><div style=\"font:400 10.5px/1.2 'Hanken Grotesk';color:#A9C6B5;margin-top:3px\">Adherence<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:16px 16px 110px\">\n\n            <!-- offline banner -->\n            <sc-if value=\"{{ isOfflineDemo }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;gap:9px;background:#FBEFD9;border:1px solid rgba(232,145,58,.4);border-radius:12px;padding:10px 13px;margin-bottom:14px\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#B97216\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><path d=\"M2 8.82a15 15 0 0 1 20 0M5 12.9a10 10 0 0 1 14 0M8.5 17a5 5 0 0 1 7 0M12 20h.01\"><\u002Fpath><\u002Fsvg>\n                <div style=\"flex:1;font:500 11.5px/1.4 'Hanken Grotesk';color:#6E4A12\">You're offline — logs are queued{{ offlineQueueSuffix }} and will sync automatically.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- daily check-in -->\n            <sc-if value=\"{{ showCheckin }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:16px;padding:14px;margin-bottom:16px\">\n                <div style=\"font:700 13.5px 'Hanken Grotesk';margin-bottom:2px\">How are you feeling today?<\u002Fdiv>\n                <div style=\"font:400 11.5px/1.4 'Hanken Grotesk';color:#857d70;margin-bottom:11px\">We'll adjust today's session if you're feeling rough.<\u002Fdiv>\n                <div style=\"display:flex;gap:8px\">\n                  <sc-for list=\"{{ checkinMoodOptions }}\" as=\"cm\" hint-placeholder-count=\"3\">\n                    <div onclick=\"{{ cm.onPick }}\" style=\"flex:1;text-align:center;padding:11px 4px;border-radius:12px;cursor:pointer;background:#F7F4EE;border:1px solid #ECE4D7;font:600 12.5px 'Hanken Grotesk'\" style-hover=\"background:#F0EBDC\">{{ cm.label }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- deload suggestion -->\n            <sc-if value=\"{{ deloadSuggested }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#0F2C20;color:#F4EFE6;border-radius:16px;padding:14px;margin-bottom:16px\">\n                <div style=\"display:flex;align-items:flex-start;gap:11px\">\n                  <div style=\"width:36px;height:36px;border-radius:11px;background:rgba(232,145,58,.28);display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F4CF9F\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"m7 14 3-4 3 3 4-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\"><div style=\"font:600 13.5px/1.25 'Hanken Grotesk'\">Time for a deload week?<\u002Fdiv><div style=\"font:400 11.5px/1.4 'Hanken Grotesk';color:#A9C6B5;margin-top:3px\">{{ deloadReason }} — a lighter week now protects progress.<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div onclick=\"{{ startDeload }}\" style=\"margin-top:12px;text-align:center;padding:11px;border-radius:11px;background:#E8913A;color:#0F4733;font:700 12.5px 'Hanken Grotesk';cursor:pointer\" style-hover=\"background:#F2A44E\">Start deload week<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ deloadActive }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;gap:10px;background:#E7F0EA;border-radius:12px;padding:11px 13px;margin-bottom:16px\">\n                <div style=\"font:600 11.5px 'Hanken Grotesk';color:#14543E;flex:1\">\\uD83D\\uDD01 Deload week active — hold or reduce load ~10%<\u002Fdiv>\n                <div onclick=\"{{ endDeload }}\" style=\"font:600 11px 'Hanken Grotesk';color:#14543E;text-decoration:underline;cursor:pointer\">End early<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- missed workout resolver -->\n            <sc-if value=\"{{ hasMissed }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#0F2C20;color:#F4EFE6;border-radius:16px;padding:14px;margin-bottom:16px;animation:aaDrop .3s ease\">\n                <div style=\"display:flex;align-items:flex-start;gap:11px\">\n                  <div style=\"width:36px;height:36px;border-radius:11px;background:rgba(232,145,58,.28);display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F4CF9F\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\"><div style=\"font:600 13.5px/1.25 'Hanken Grotesk'\">You missed {{ missedName }}<\u002Fdiv><div style=\"font:400 11.5px/1.4 'Hanken Grotesk';color:#A9C6B5;margin-top:3px\">{{ missedDateLabel }} · your call — skip it and stay on schedule, or shift the whole plan forward a day.<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:9px;margin-top:12px\">\n                  <div onclick=\"{{ skipMissed }}\" style=\"flex:1;text-align:center;padding:11px;border-radius:11px;background:rgba(244,239,230,.12);border:1px solid rgba(244,239,230,.2);font:600 12.5px 'Hanken Grotesk';cursor:pointer\" style-hover=\"background:rgba(244,239,230,.2)\">Skip it<\u002Fdiv>\n                  <div onclick=\"{{ shiftPlan }}\" style=\"flex:1;text-align:center;padding:11px;border-radius:11px;background:#E8913A;color:#0F4733;font:700 12.5px 'Hanken Grotesk';cursor:pointer\" style-hover=\"background:#F2A44E\">Shift plan +1 day<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- today's workout -->\n            <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:9px\"><div style=\"font:700 13px 'Hanken Grotesk'\">Today's workout<\u002Fdiv><div style=\"margin-left:auto;font:600 11px 'Geist Mono';color:#857d70\">{{ planVersionLabel }}<\u002Fdiv><\u002Fdiv>\n            <sc-if value=\"{{ todayIsRest }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:16px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:12px\">\n                <div style=\"width:44px;height:44px;border-radius:13px;background:#E7F0EA;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#14543E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3a9 9 0 1 0 9 9 7 7 0 0 1-9-9Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <div style=\"flex:1\"><div style=\"font:700 15px 'Hanken Grotesk'\">Rest day<\u002Fdiv><div style=\"font:400 11.5px/1.4 'Hanken Grotesk';color:#857d70;margin-top:2px\">Recovery is training too. Next session: {{ nextWorkoutLabel }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ todayHasWorkout }}\" hint-placeholder-val=\"{{ true }}\">\n              <div onclick=\"{{ goTrain }}\" style=\"background:#fff;border:1.5px solid #14543E;border-radius:16px;padding:15px;margin-bottom:16px;cursor:pointer\" style-hover=\"background:#FBFAF5\">\n                <div style=\"display:flex;align-items:center;gap:12px\">\n                  <div style=\"width:44px;height:44px;border-radius:13px;background:#E7F0EA;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#14543E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6.5 6.5 17.5 17.5\"><\u002Fpath><path d=\"m4 9-1.5 1.5a2 2 0 0 0 0 3L4 15M20 9l1.5 1.5a2 2 0 0 1 0 3L20 15\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\"><div style=\"font:700 15.5px/1.2 'Hanken Grotesk';color:#14543E\">{{ todayWorkoutName }}<\u002Fdiv><div style=\"font:400 11.5px 'Hanken Grotesk';color:#857d70;margin-top:3px\">{{ todayWorkoutSub }}<\u002Fdiv><\u002Fdiv>\n                  <sc-if value=\"{{ todayDone }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font:600 11px 'Hanken Grotesk';color:#3F9D6B;background:#E7F0EA;padding:6px 11px;border-radius:999px;flex:none\">✓ Done<\u002Fdiv><\u002Fsc-if>\n                  <sc-if value=\"{{ todayNotDone }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font:600 11px 'Hanken Grotesk';color:#fff;background:#14543E;padding:6px 12px;border-radius:999px;flex:none\">Start<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"margin-top:12px\">\n                  <div style=\"display:flex;justify-content:space-between;margin-bottom:5px\"><div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70\">Completion<\u002Fdiv><div style=\"font:600 10.5px 'Hanken Grotesk';color:#14543E\">{{ completionLabel }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"height:7px;border-radius:999px;background:#EFE9DD;overflow:hidden\"><div style=\"width:{{ completionPct }};height:100%;background:linear-gradient(90deg,#14543E,#3F9D6B);border-radius:999px;transition:width .35s ease\"><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- week strip -->\n            <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:9px\"><div style=\"font:700 13px 'Hanken Grotesk'\">This week<\u002Fdiv><div onclick=\"{{ goSchedule }}\" style=\"margin-left:auto;font:600 11px 'Hanken Grotesk';color:#14543E;cursor:pointer\">Full schedule →<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:6px;margin-bottom:16px\">\n              <sc-for list=\"{{ weekStrip }}\" as=\"w\" hint-placeholder-count=\"7\">\n                <div style=\"flex:1;text-align:center;background:{{ w.bg }};border:1px solid {{ w.border }};border-radius:12px;padding:9px 2px\">\n                  <div style=\"font:600 9px 'Geist Mono';color:{{ w.dayColor }}\">{{ w.day }}<\u002Fdiv>\n                  <div style=\"font:700 13px 'Bricolage Grotesque';color:{{ w.numColor }};margin-top:3px\">{{ w.num }}<\u002Fdiv>\n                  <div style=\"width:7px;height:7px;border-radius:50%;background:{{ w.dot }};margin:5px auto 0\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- diet -->\n            <div onclick=\"{{ goDiet }}\" style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:13px;margin-bottom:12px;cursor:pointer\" style-hover=\"border-color:#14543E\">\n              <div style=\"width:40px;height:40px;border-radius:12px;background:#FBEFD9;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E8913A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 11h16a8 8 0 0 1-16 0Z\"><\u002 chnique before your first set — right here, no need to leave the app.<\u002Fdiv><\u002Fdiv>\n              <div style=\"padding:10px 14px 14px\"><div style=\"position:relative;width:100%;padding-top:56.25%;border-radius:12px;overflow:hidden;background:#1E1C18\">\n                {{ videoEl }}\n              <\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;bottom:88px;left:0;right:0;padding:0 16px;z-index:40\">\n          <div onclick=\"{{ exdToggle }}\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;background:{{ exdToggleBg }};color:{{ exdToggleColor }};border-radius:13px;padding:14px;font:700 14px 'Hanken Grotesk';cursor:pointer;box-shadow:0 12px 28px -8px rgba(15,44,32,.35)\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>{{ exdToggleLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SCHEDULE ============ -->\n      <sc-if value=\"{{ isSchedule }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"scr\" data-screen-label=\"Schedule\">\n          <div style=\"padding:58px 18px 16px;background:#14543E;color:#F4EFE6;border-radius:0 0 22px 22px\">\n            <div style=\"font:700 22px 'Bricolage Grotesque'\">Schedule<\u002Fdiv>\n            <div style=\"font:400 12px/1.4 'Hanken Grotesk';color:#A9C6B5;margin-top:4px\">Miss a day? Skip it or shift the whole plan — your choice.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:16px 16px 110px\">\n            <sc-if value=\"{{ hasMissed }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#0F2C20;color:#F4EFE6;border-radius:16px;padding:14px;margin-bottom:16px\">\n                <div style=\"font:600 13px/1.3 'Hanken Grotesk'\">You missed {{ missedName }} style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:13px\"><div style=\"font:600 11.5px 'Hanken Grotesk';margin-bottom:9px\">Workouts / week<\u002Fdiv><div style=\"display:flex;align-items:flex-end;gap:4px;height:46px\">\n                <sc-for list=\"{{ weeklyBars }}\" as=\"b\" hint-placeholder-count=\"5\"><div style=\"flex:1;height:{{ b.h }};background:{{ b.bg }};border-radius:3px\"><\u002Fdiv><\u002Fsc-for>\n              <\u002Fdiv><div style=\"font:700 14px 'Bricolage Grotesque';color:#14543E;margin-top:7px\">{{ weekCount }} this week<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:13px\"><div style=\"font:600 11.5px 'Hanken Grotesk';margin-bottom:9px\">Weight trend<\u002Fdiv><svg width=\"100%\" height=\"46\" viewBox=\"0 0 140 46\" preserveAspectRatio=\"none\"><polyline points=\"{{ weightPtsSmall }}\" fill=\"none\" stroke=\"#E8913A\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><div style=\"font:700 14px 'Bricolage Grotesque';color:#14543E;margin-top:7px\">{{ weightTotalDelta }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:13px\"><div style=\"font:600 11.5px 'Hanken Grotesk';margin-bottom:9px\">Muscle mass<\u002Fdiv><svg width=\"100%\" height=\"46\" viewBox=\"0 0 140 46\" preserveAspectRatio=\"none\"><polyline points=\"{{ smmPtsSmall }}\" fill=\"none\" stroke=\"#3F9D6B\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><div style=\"font:700 14px 'Bricolage Grotesque';color:#3F9D6B;margin-top:7px\">{{ smmTotalDelta }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:13px\"><div style=\"font:600 11.5px 'Hanken Grotesk';margin-bottom:9px\">Body fat<\u002Fdiv><svg width=\"100%\" height=\"46\" viewBox=\"0 0 140 46\" preserveAspectRatio=\"none\"><polyline points=\"{{ fatPtsSmall }}\" fill=\"none\" stroke=\"#14543E\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><div style=\"font:700 14px 'Bricolage Grotesque';color:#14543E;margin-top:7px\">{{ fatTotalDelta }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font:700 13px 'Hanken Grotesk';margin-bottom:9px\">Recent history<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <sc-for list=\"{{ historyRows }}\" as=\"h\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #ECE4D7;border-radius:12px;padding:11px 13px\">\n                  <div style=\"font:600 12px 'Geist Mono';color:#857d70;width:52px;flex:none\">{{ h.date }}<\u002Fdiv>\n                  <div style=\"flex:1;font:500 12.5px 'Hanken Grotesk'\">{{ h.name }}<\u002Fdiv>\n                  <div style=\"font:600 10.5px 'Hanken Grotesk';color:{{ h.color }};background:{{ h.bg }};padding:4px 10px;border-radius:999px\">{{ h.label }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div onclick=\"{{ exportCsv }}\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;background:#F2EFE8;border:1px solid #E4DCCD;border-radius:12px;padding:12px;font:600 12.5px 'Hanken Grotesk';cursor:pointer;margin-top:16px\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1E1C18\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12\"><\u002Fpath><path d=\"m7 10 5 5 5-5\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>Export workouts, InBody &amp; meals (CSV)<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ INBODY ============ -->\n      <sc-if value=\"{{ isInbody }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"scr\" data-screen-label=\"InBody\">\n          <div style=\"padding:58px 18px 18px;background:#14543E;color:#F4EFE6;border-radius:0 0 24px 24px\">\n            <div style=\"font:700 22px 'Bricolage Grotesque';margin-bottom:4px\">Body<\u002Fdiv>\n            <div style=\"font:400 12px/1.4 'Hanken Grotesk';color:#A9C6B5\">InBody reports · {{ reportCount }} scans · goal: <b style=\"color:#F4CF9F\">{{ goalLabel }}<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:16px 16px 110px\">\n            <!-- latest metrics -->\n            <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px\">\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:12px\"><div style=\"font:400 10.5px 'Hanken Grotesk';color:#857d70\">Weight<\u002Fdiv><div style=\"font:700 18px/1.1 'Bricolage Grotesque';margin-top:4px\">{{ curWeight }}<span style=\"font-size:10px;color:#857d70\"> kg<\u002Fspan><\u002Fdiv><div style=\"font:500 10px 'Hanken Grotesk';color:{{ dWeightColor }};margin-top:2px\">{{ dWeight }} kg<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:12px\"><div style=\"font:400 10.5px 'Hanken Grotesk';color:#857d70\">Muscle (SMM)<\u002Fdiv><div style=\"font:700 18px/1.1 'Bricolage Grotesque';margin-top:4px\">{{ curSmm }}<span style=\"font-size:10px;color:#857d70\"> kg<\u002Fspan><\u002Fdiv><div style=\"font:500 10px 'Hanken Grotesk';color:{{ dSmmColor }};margin-top:2px\">{{ dSmm }} kg<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:12px\"><div style=\"font:400 10.5px 'Hanken Grotesk';color:#857d70\">Body fat<\u002Fdiv><div style=\"font:700 18px/1.1 'Bricolage Grotesque';margin-top:4px\">{{ curFat }}<span style=\"font-size:10px;color:#857d70\"> %<\u002Fspan><\u002Fdiv><div style=\"font:500 10px 'Hanken Grotesk';color:{{ dFatColor }};margi  stroke-linejoin=\"round\"><path d=\"M15 5l-7 7 7 7\"><\u002Fpath><\u002Fsvg>\n              <div style=\"font:600 13px 'Hanken Grotesk';color:#A9C6B5\">AI plan update<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-start;gap:10px;background:rgba(232,145,58,.18);border:1px solid rgba(232,145,58,.34);border-radius:14px;padding:12px 13px\">\n              <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F4CF9F\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M12 3l1.9 5.2L19 10l-5.1 1.8L12 17l-1.9-5.2L5 10l5.1-1.8z\"><\u002Fpath><\u002Fsvg>\n              <div><div style=\"font:600 12.5px/1.3 'Hanken Grotesk';color:#F9E7CF\">{{ aiHeadline }}<\u002Fdiv><div style=\"font:400 11px/1.35 'Hanken Grotesk';color:#E8C9A4;margin-top:3px\">Based on your new report vs {{ prevReportLabel }}.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:15px 16px 130px\">\n            <!-- what changed in your body -->\n            <div style=\"font:700 13px 'Hanken Grotesk';margin-bottom:9px\">What your scan shows<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px\">\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:12px\"><div style=\"font:400 10.5px 'Hanken Grotesk';color:#857d70\">Weight<\u002Fdiv><div style=\"font:700 16px/1.1 'Bricolage Grotesque';color:{{ dWeightColor }};margin-top:4px\">{{ dWeight }} kg<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:12px\"><div style=\"font:400 10.5px 'Hanken Grotesk';color:#857d70\">Muscle<\u002Fdiv><div style=\"font:700 16px/1.1 'Bricolage Grotesque';color:{{ dSmmColor }};margin-top:4px\">{{ dSmm }} kg<\u002Fdiv><\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;padding:12px\"><div style=\"font:400 10.5px 'Hanken Grotesk';color:#857d70\">Body fat<\u002Fdiv><div style=\"font:700 16px/1.1 'Bricolage Grotesque';color:{{ dFatColor }};margin-top:4px\">{{ dFat }} pts<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <!-- goal -->\n            <div style=\"font:700 13px 'Hanken Grotesk';margin-bottom:9px\">Your goal<\u002Fdiv>\n            <div style=\"display:flex;gap:8px;margin-bottom:16px\">\n              <sc-for list=\"{{ goalChips }}\" as=\"g\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ g.onPick }}\" style=\"flex:1;text-align:center;padding:11px 6px;border-radius:13px;cursor:pointer;border:1.5px solid {{ g.border }};background:{{ g.bg }}\"><div style=\"font:600 12.5px 'Hanken Grotesk';color:{{ g.color }}\">{{ g.label }}<\u002Fdiv><div style=\"font:400 9.5px 'Hanken Grotesk';color:{{ g.sub }};margin-top:2px\">{{ g.subLabel }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <!-- proposed changes -->\n            <div style=\"font:700 13px 'Hanken Grotesk';margin-bottom:9px\">What the AI changed<\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:16px;overflow:hidden;margin-bottom:16px\">\n              <sc-for list=\"{{ proposals }}\" as=\"pp\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid #F3EEE3\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3F9D6B\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;margin-top:1px\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                  <div style=\"font:500 12.5px/1.4 'Hanken Grotesk'\">{{ pp.text }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <!-- new split -->\n            <div sty ly — consult a qualified doctor, dietitian &amp; certified personal trainer before starting or making significant changes to your program.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid #ECE4D7;padding:12px 16px 30px;display:flex;gap:10px;z-index:40\">\n          <div onclick=\"{{ keepPlan }}\" style=\"flex:none;display:flex;align-items:center;justify-content:center;padding:0 18px;background:#F2EFE8;border:1px solid #E4DCCD;border-radius:13px;font:600 13px 'Hanken Grotesk';cursor:pointer\">Keep current<\u002Fdiv>\n          <div onclick=\"{{ applyPlan }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#14543E;color:#fff;border-radius:13px;padding:14px;font:700 14px 'Hanken Grotesk';cursor:pointer\" style-hover=\"background:#0F4733\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>Apply new plan<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ DIET ============ -->\n      <sc-if value=\"{{ isDiet }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"scr\" data-screen-label=\"Diet\">\n          <div style=\"padding:54px 18px 16px;background:#14543E;color:#F4EFE6;border-radius:0 0 22px 22px\">\n            <div onclick=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:12px;margin-bottom:13px;cursor:pointer\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F4EFE6\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 5l-7 7 7 7\"><\u002Fpath><\u002Fsvg>\n              <div style=\"font:600 13px 'Hanken Grotesk';color:#A9C6B5\">Diet plan · {{ planVersionLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font:700 19px/1.2 'Bricolage Grotesque'\">{{ dietTitle }}<\u002Fdiv>\n            <div style=\"font:400 11.5px/1.4 'Hanken Grotesk';color:#A9C6B5;margin-top:5px\">AI-personalised for <b style=\"color:#F4CF9F\">{{ goalLabel }}<\u002Fb> from your latest InBody · {{ dietTargets }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:15px 16px 110px\">\n\n            <!-- calorie tracker -->\n            <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:16px;padding:14px;margin-bottom:16px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:11px\">\n                <div style=\"font:700 13px 'Hanken Grotesk'\">Today's calories<\u002Fdiv>\n                <div style=\"font:600 11px 'Hanken Grotesk';color:#857d70\">{{ remainingKcal }} kcal left<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:10px;margin-bottom:12px\">\n                <div style=\"flex:1.2\"><div style=\"display:flex;align-items:baseline;gap:5px\"><div style=\"font:700 22px/1 'Bricolage Grotesque';color:#14543E\">{{ loggedKcal }}<\u002Fdiv><div style=\"font:400 11px 'Hanken Grotesk';color:#857d70\">/ {{ targetKcal }} kcal<\u002Fdiv><\u002Fdiv>\n                  <div style=\"height:7px;border-radius:999px;background:#EFE9DD;overflow:hidden;margin-top:7px\"><div style=\"width:{{ loggedPct }};height:100%;background:linear-gradient(90deg,#14543E,#3F9D6B);border-radius:999px;transition:width .35s ease\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1\"><div style=\"display:flex;align-items:baseline;gap:5px\"><div style=\"font:700 22px/1 'Bricolage Grotesque';color:#14543E\">{{ loggedProtein }}<\u002Fdiv><div style=\"font:400 11px 'Hanken Grotesk';color:#857d70\">/ {{ targetProtein }}g P<\u002Fdiv><\u002Fdiv>\n                  <div style=\"height:7px;border-radius:999px;background:#EFE9DD;overflow:hidden;margin-top:7px\"><div style=\"width:{{ loggedProteinPct }};height:100%;background:linear-gradient(90deg,#E8913A,#F2B441);border-radius:999px;transition:width .35s ease\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ openLogMeal }}\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;background:#14543E;color:#fff;border-radius:12px;padding:12px;font:700 13px 'Hanken Grotesk';cursor:pointer;margin-bottom:8px\" style-hover=\"background:#0F4733\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7h3l2-2h8l2 2h3v12H3z\"><\u002Fpath><circle cx=\"12\" cy=\"13\" r=\"3.5\"><\u002Fcircle><\u002Fsvg>Snap &amp; log a meal<\u002Fdiv>\n              <div style=\"display:flex;gap:8px\">\n                <div onclick=\"{{ scanBarcode }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:#F2EFE8;border:1px solid #E4DCCD;border-radius:11px;padding:10px;font:600 12px 'Hanken Grotesk';cursor:pointer\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1E1C18\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 5v14M8 5v14M12 5v10M16 5v14M20 5v14\"><\u002Fpath><\u002Fsvg>Scan barcode<\u002Fdiv>\n                <div onclick=\"{{ copyYesterday }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:#F2EFE8;border:1px solid #E4DCCD;border-radius:11px;padding:10px;font:600 12px 'Hanken Grotesk';cursor:pointer\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1E1C18\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"8\" y=\"8\" width=\"12\" height=\"12\" rx=\"2\"><\u002Frect><path d=\"M4 16V5a1 1 0 0 1 1-1h11\"><\u002Fpath><\u002Fsvg>Copy yesterday<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- adaptive TDEE - x 'Geist Mono';background:#F2EFE8;color:#5a6f63;padding:3px 8px;border-radius:6px\">P {{ meal.protein }}g<\u002Fspan>\n                      <span style=\"font:600 10px 'Geist Mono';background:#F2EFE8;color:#5a6f63;padding:3px 8px;border-radius:6px\">{{ meal.kcal }} kcal<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"font:700 13px 'Hanken Grotesk';margin-bottom:9px\">Logged from photos<\u002Fdiv>\n            <sc-if value=\"{{ loggedEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:center;padding:22px 16px;color:#857d70;background:#fff;border:1px dashed #E4DCCD;border-radius:14px;margin-bottom:16px\"><div style=\"font:600 12.5px 'Hanken Grotesk'\">No meals logged yet today<\u002Fdiv><div style=\"font:400 11px 'Hanken Grotesk';margin-top:4px\">Snap a photo of your plate to auto-log it here.<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:16px\">\n              <sc-for list=\"{{ loggedRows }}\" as=\"lg\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #ECE4D7;border-radius:12px;padding:11px 13px\">\n                  <div style=\"width:34px;height:34px;border-radius:10px;background:#FBEFD9;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E8913A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7h3l2-2h8l2 2h3v12H3z\"><\u002Fpath><circle cx=\"12\" cy=\"13\" r=\"3.5\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\"><div style=\"font:600 12.5px/1.2 'Hanken Grotesk'\">{{ lg.name }}<\u002Fdiv><div style=\"font:400 10.5px 'Hanken Grotesk';color:#857d70;margin-top:2px\">{{ lg.macroLabel }} · {{ lg.time }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"font:600 11px 'Hanken Grotesk';color:#857d70;flex:none\">{{ lg.kcal }} kcal<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;align-items:center;gap:9px;background:#E7F0EA;border-radius:12px;padding:11px 13px;margin-bottom:10px\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#14543E\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><path d=\"M12 3l1.9 5.2L19 10l-5.1 1.8L12 17l-1.9-5.2L5 10l5.1-1.8z\"><\u002Fpath><\u002Fsvg><div style=\"font:500 11.5px/1.4 'Hanken Grotesk';color:#14543E\">This plan refreshes automatically each time you upload a new InBody report.<\u002Fdiv><\u002Fdiv>\n            <div style=\"font:400 10.5px/1.5 'Hanken Grotesk';color:#A39A8A;padding:0 2px\">For guidance only — consult a qualified doctor, dietitian &amp; certified personal trainer before starting or making significant changes to your program.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ LOG MEAL (photo → AI → calories) ============ -->\n      <sc-if value=\"{{ isLogMeal }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"scr\" data-screen-label=\"Log meal\">\n          <div style=\"padding:54px 18px 16px;background:#14543E;color:#F4EFE6;border-radius:0 0 22px 22px\">\n            <div onclick=\"{{ cancelLogMeal }}\" style=\"display:flex;align-items:center;gap:12px;margin-bottom:13px;cursor:pointer\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F4EFE6\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 5l-7 7 7 7\"><\u002Fpath><\u002Fsvg>\n              <div style=\"font:600 13px 'Hanken Grotesk';color:#A9C6B5\">Log a meal<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font:700 19px/1.2 'Bricolage Grotesque'\">Snap your plate<\u002Fdiv>\n            <div style=\"font:400 11.5px/1.4 'Hanken Grotesk';color:#A9C6B5;margin-top:5px\">AI identifies the dish and estimates calories &amp; macros automatically.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:16px 16px 30px\">\n\n            <!-- CAPTURE -->\n            <sc-if value=\"{{ lmIsCapture }}\" hint-placeholder-val=\"{{ true }}\">\n              <sc-if value=\"{{ lmHasPhoto }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"width:100%;border-radius:16px;overflow:hidden;margin-bottom:14px;background:#1E1C18\">{{ lmPhotoBig }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"display:flex;flex-direction:column;gap:10px\">\n                <input type=\"file\" accept=\"image/*\" capture=\"environment\" onchange=\"{{ onPhotoFile }}\" style=\"display:none\" id=\"mealPhotoInput\">\n                <label for=\"mealPhotoInput\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;border:1.5px dashed #C9BFAD;border-radius:16px;padding:34px 20px;cursor:pointer;color:#857d70;background:#fff\">\n                  <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#14543E\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7h3l2-2h8l2 2h3v12H3z\"><\u002Fpath><circle cx=\"12\" cy=\"13\" r=\"3.5\"><\u002Fcircle><\u002Fsvg>\n                  <div style=\"font:600 13px 'Hanken Grotesk';color:#14543E\">Take or choose a photo<\u002Fdiv>\n                  <div style=\"font:400 11px 'Hanken Grotesk';color:#857d70\">Your camera roll or camera will open<\u002Fdiv>\n                <\u002Flabel>\n                <div onclick=\"{{ identifyFood }}\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;background:#14543E;color:#fff;border-radius:13px;padding:14px;font:700 14px 'Hanken Grotesk';cursor:pointer\" style-hover=\"background:#0F4733\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l1.9 5.2L19 10l-5.1 1.8L12 17l-1.9-5.2L5 10l5.1-1.8z\"><\u002Fpath><\u002Fsvg>Identify food with AI<\u002Fdiv>\n                <div onclick=\"{{ scanBarcode }}\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;background:#F2EFE8;border:1px solid #E4DCCD;color:#1E1C18;border-radius:13px;padding:13px;font:600 13px 'Hanken Grotesk';cursor:pointer\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1E1C18\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 5v14M8 5v14M12 5v10M16 5v14M20 5v14\"><\u002Fpath><\u002Fsvg>Scan a barcode instead<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ANALYZING -->\n            <sc-if value=\"{{ lmIsAnalyzing }}\" hint-placeholder-val=\"{{ false }}\">\n              <sc-if value=\"{{ lmHasPhoto }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"width:100%;border-radius:16px;overflow:hidden;margin-bottom:16px;background:#1E1C18\">{{ lmPhotoDim }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ lmSample }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"width:100%;height:180px;border-radius:16px;margin-bottom:16px;background:repeating-linear-gradient(135deg,#E7F0EA,#E7F0EA 10px,#F4F0E8 10px,#F4F0E8 20px);display:flex;align-items:center;justify-content:center\"><div style=\"font:600 11px 'Geist Mono';color:#5a6f63\">sample plate photo<\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:18px 10px\">\n                <div style=\"width:56px;height:56px;border-radius:18px;background:#E8913A;display:flex;align-items:center;justify-content:center;animation:aaPulse 1.4s infinite\"><svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0F4733\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l1.9 5.2L19 10l-5.1 1.8L12 17l-1.9-5.2L5 10l5.1-1.8z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <div style=\"font:700 16px 'Bricolage Grotesque';margin-top:16px\">Identifying your food…<\u002Fdiv>\n                <div style=\"font:400 11.5px/1.5 'Hanken Grotesk';color:#857d70;margin-top:5px\">Recognising the dish and estimating portion size &amp; nutrition.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- RESULT -->\n            <sc-if value=\"{{ lmIsResult }}\" hint-placeholder-val=\"{{ false }}\">\n              <sc-if value=\"{{ lmHasPhoto }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"width:100%;border-radius:16px;overflow:hidden;margin-bottom:14px;background:#1E1C18\">{{ lmPhotoResult }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ lmSample }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"width:100%;height:160px;border-radius:16px;margin-bottom:14px;background:repeating-linear-gradient(135deg,#E7F0EA,#E7F0EA 10px,#F4F0E8 10px,#F4F0E8 20px);display:flex;align-items:center;justify-content:center\"><div style=\"font:600 11px 'Geist Mono';color:#5a6f63\">sample plate photo<\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:16px;padding:15px;margin-bottom:14px\">\n                <sc-if value=\"{{ lmViaBarcode }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:9px\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3F9D6B\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"m8.5 12 2.5 2.5 4.5-5\"><\u002Fpath><\u002Fsvg><div style=\"font:600 10.5px 'Geist Mono';color:#3F9D6B\">EXACT MATCH · BARCODE<\u002Fdiv><\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ lmNotBarcode }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:9px\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3F9D6B\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"m8.5 12 2.5 2.5 4.5-5\"><\u002Fpath><\u002Fsvg><div style=\"font:600 10.5px 'Geist Mono';color:#3F9D6B\">{{ lmConfidence }}% MATCH<\u002Fdiv><\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"font:700 17px/1.25 'Bricolage Grotesque'\">{{ lmFoodName }}<\u002Fdiv>\n                <div style=\"font:700 22px/1 'Bricolage Grotesque';color:#14543E;margin-top:9px\">{{ lmFoodKcal }} <span style=\"font-size:12px;color:#857d70;font-weight:500\">kcal<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:6px;margin-top:10px\">\n                  <span style=\"font:600 10.5px 'Geist Mono';background:#F2EFE8;color:#5a6f63;padding:4px 9px;border-radius:6px\">P {{ lmFoodProtein }}g<\u002Fspan>\n                  <span style=\"font:600 10.5px 'Geist Mono';background:#F2EFE8;color:#5a6f63;padding:4px 9px;border-radius:6px\">C {{ lmFoodCarbs }}g<\u002Fspan>\n                  <span style=\"font:600 10.5px 'Geist Mono';background:#F2EFE8;color:#5a6f63;padding:4px 9px;border-radius:6px\">F {{ lmFoodFat }}g<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:10px\">\n                <div onclick=\"{{ retakePhoto }}\" style=\"flex:none;display:flex;align-items:center;justify-content:center;padding:0 18px;background:#F2EFE8;border:1px solid #E4DCCD;border-radius:13px;font:600 13px 'Hanken Grotesk';cursor:pointer\">Re 390, protein: 40, carbs: 16, fat: 15 },\n    { name: 'Mixed Fruit Bowl', kcal: 170, protein: 3, carbs: 40, fat: 1 },\n    { name: 'Sambar Vada (2 pcs)', kcal: 320, protein: 10, carbs: 38, fat: 13 },\n  ];\n\n  BARCODE_DB = [\n    { name: 'Whey Protein Scoop (30g)', kcal: 120, protein: 24, carbs: 3, fat: 2, brand: 'MuscleBlaze' },\n    { name: 'Greek Yogurt Cup (150g)', kcal: 130, protein: 12, carbs: 8, fat: 5, brand: 'Epigamia' },\n    { name: 'Peanut Butter (2 tbsp)', kcal: 190, protein: 8, carbs: 6, fat: 16, brand: 'Pintola' },\n    { name: 'Protein Bar', kcal: 220, protein: 20, carbs: 22, fat: 7, brand: 'RiteBite' },\n    { name: 'Brown Bread (2 slices)', kcal: 140, protein: 6, carbs: 24, fat: 2, brand: 'Britannia' },\n  ];\n\n  pad2(n) { return (n < 10 ? '0' : '') + n; }\n  todayISO() { const d = new Date(); return d.getFullYear() + '-' + this.pad2(d.getMonth() + 1) + '-' + this.pad2(d.getDate()); }\n  addDaysISO(iso, days) { const dt = new Date(iso + 'T00:00:00Z'); dt.setUTCDate(dt.getUTCDate() + days); return dt.toISOString().slice(0, 10); }\n  fmt(iso) { if (!iso) return ''; const p = iso.split('-'); return parseInt(p[2], 10) + ' ' + this.MONTHS[parseInt(p[1], 10) - 1]; }\n  dow(iso) { return this.DOWS[new Date(iso + 'T00:00:00Z').getUTCDay()]; }\n\n  goal() { return this.state.data.profile.goal || 'fatloss'; }\n\n  buildSchedule(startOffset, endOffset, goalKey, doneUntil) {\n    const rot = this.ROTATIONS[goalKey] || this.ROTATIONS.fatloss;\n    const today = this.todayISO();\n    const out = [];\n    for (let i = startOffset; i <= endOffset; i++) {\n      const dateISO = this.addDaysISO(today, i);\n      const wid = rot[((i % 7) + 7) % 7];\n      let status;\n      if (wid === 'rest') status = 'rest';\n      else if (i < 0) status = (i === -6 || i === -13) ? 'skipped' : 'done';\n      else status = 'upcoming';\n      out.push({ id: 's' + i + '_' + dateISO, dateISO, workoutId: wid, status });\n    }\n    return out;\n  }\n\n  genReferralCode() { return 'AR' + Math.random().toString(36).slice(2, 6).toUpperCase(); }\n\n  defaults() {\n    const today = this.todayISO();\n    return {\n      __v: 2,\n      auth: { phone: '', verified: false },\n      onboarding: { goalDone: false, bodyDone: false },\n      profile: {\n        name: 'Arjun', goal: 'fatloss', weightKg: null, heightCm: null, age: null, gender: '', activityLevel: '',\n        detailedKnown: false, bodyFatPct: null, measurements: { chest: '', waist: '', arms: '', thighs: '' },\n      },\n      planVersion: 3,\n      schedule: this.buildSchedule(-27, 13, 'fatloss'),\n      exDone: {},\n      inbody: [\n        { dateISO: this.addDaysISO(today, -49), weight: 80.5, smm: 32.5, fat: 26.4 },\n        { dateISO: this.addDaysISO(today, -28), weight: 79.2, smm: 32.8, fat: 25.3 },\n        { dateISO: this.addDaysISO(today, -14), weight: 78.4, smm: 33.1, fat: 24.6 },\n      ],\n      referral: {\n        code: this.genReferralCode(), referredCount: 2, freeWeeksEarned: 2,\n        history: [\n          { name: 'Rohit S.', dateISO: this.addDaysISO(today, -9) },\n          { name: 'Sana K.', dateISO: this.addDaysISO(today, -3) },\n        ],\n      },\n      calorieLog: {},\n      checkins: {},\n      deloadActive: false,\n      gamificationStyle: 'playful',\n    };\n  }\n\n  initialRouteFor(d) {\n    if (!d.auth || !d.auth.verified) return 'login';\n    if (!d.onboarding || !d.onboarding.goalDone) return 'goal';\n    if (!d.onboarding.bodyDone) return 'bodyinfo';\n    return 'home';\n  }\n\n  state = {\n    route: this.initialRouteFor(this.load()), toast: null, metric: 'weight',\n    iForm: { weight: '', smm: '', fat: '' },\n    aiStep: 0, pendingGoal: null, aiMode: 'update',\n    authPhone: '', authOtp: '',\n    bodyForm: { weight: '', height: '', age: '', gender: '', activity: '', detailed: false, chest: '', waist: '', arms: '', thighs: '', bodyFat: '', agree: false },\n    logMeal: { step: 'capture', photoUrl: null, sample: false, food: null },\n    isOfflineDemo: false, offlineQueueCount: 0, demoOpen: false,\n    data: this.load(),\n  };\n\n  load() {\n    const def = this.defaults();\n    try { const raw = localStorage.getItem(LS_KEY); if (raw) { const p = JSON.parse(raw); if (p && p.__v === 2) return { ...def, ...p }; } } catch (e) {}\n    return def;\n  }\n  persist(data) { try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {} }\n  mut(fn) { const data = JSON.parse(JSON.stringify(this.state.data)); fn(data); this.setState({ data }); this.persist(data); }\n\n  _toastTimer = null;\n  showToast(msg) { if (this._toastTimer) clearTimeout(this._toastTimer); this.setState({ toast: msg }); this._toastTimer = setTimeout(() => this.setState({ toast: null }), 2500); }\n\n  go(route) { this.setState({ route, demoOpen: false }); }\n  toggleDemo = () => { this.setState(s => ({ demoOpen: !s.demoOpen })); };\n\n  // ---- auth / onboarding ----\n  onAuthPhone = (e) => { const v = e.target.value.replace(/\\D/g, '').slice(0, 10); this.setState({ authPhone: v }); };\n  onAuthOtp = (e) => { const v = e.target.value.replace(/\\D/g, '').slice(0, 4); this.setState({ authOtp: v }); };\n  sendOtp = () => {\n    if (this.state.authPhone.length !== 10) { this.showToast('Enter a valid 10-digit phone number'); return; }\n    this.mut(d => { d.auth.phone = this.state.authPhone; });\n    this.setState({ route: 'otp', authOtp: '' });\n    this.showToast('OTP sent to +91 ' + this.state.authPhone);\n  };\n  resendOtp = () => this.showToast('OTP resent — demo code is 1234');\n  changeNumber = () => this.go('login');\n  verifyOtp = () => {\n    if (this.state.authOtp !== '1234') { this.showToast('Incorrect code — try 1234 for this demo'); return; }\n    this.mut(d => { d.auth.verified = true; });\n    const d = this.state.data;\n    this.go(!d.onboarding.goalDone ? 'goal' : (!d.onboarding.bodyDone ? 'bodyinfo' : 'home'));\n    this.showToast('Phone verified \\u2713');\n  };\n  pickOnboardGoal(g) { this.mut(d => { d.profile.goal = g; }); }\n  continueGoal = () => { this.mut(d => { d.onboarding.goalDone = true; }); this.go('bodyinfo'); };\n  onBodyField = (k) => (e) => { const v = e.target.value; this.setState(s => ({ bodyForm: { ...s.bodyForm, [k]: v } })); };\n  pickGender(g) { this.setState(s => ({ bodyForm: { ...s.bodyForm, gender: g } })); }\n  pickActivity(a) { this.setState(s => ({ bodyForm: { ...s.bodyForm, activity: a } })); }\n  toggleDetailed = () => { this.setState(s => ({ bodyForm: { ...s.bodyForm, detailed: !s.bodyForm.detailed } })); };\n  toggleAgree = () => { this.setState(s => ({ bodyForm: { ...s.bodyForm, agree: !s.bodyForm.agree } })); };\n  submitBodyInfo = () => {\n    const f = this.state.bodyForm;\n    const w = parseFloat(f.weight), h = parseFloat(f.height), age = parseInt(f.age, 10);\n    if (!w || !h || !age || !f.gender || !f.activity) { this.showToast('Fill in weight, height, age, gender & activity level'); return; }\n    if (!f.agree) { this.showToast('Please acknowledge the guidance note to continue'); return; }\n    this.mut(d => {\n      d.profile.weightKg = w; d.profile.heightCm = h; d.profile.age = age;\n      d.profile.gender = f.gender; d.profile.activityLevel = f.activity;\n      d.profile.detailedKnown = !!f.detailed;\n      if (f.detailed) {\n        d.profile.measurements = { chest: f.chest, waist: f.waist, arms: f.arms, thighs: f.thighs };\n        if (f.bodyFat) d.profile.bodyFatPct = parseFloat(f.bodyFat);\n      }\n      d.onboarding.bodyDone = true;\n    });\n    this.clearAiTimers();\n    this.setState({ route: 'analyzing', aiMode: 'onboard', aiStep: 0 });\n    const stepMs = 2200 / 4;\n    for (let i = 1; i <= 4; i++) {\n      this._aiTimers.push(setTimeout(() => {\n        if (i < 4) this.setState({ aiStep: i });\n        else { this.setState({ aiStep: 4 }); this.go('home'); this.showToast('Your personalized plan is ready \\u2713'); }\n      }, stepMs * i));\n    }\n  };\n\n  // ---- referral ----\n  referralLink() { return 'aarogya.app/join/' + (this.state.da
