document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}<\u002Fdiv><div style=\"font:600 13px 'Hanken Grotesk'\">{{ t.exercise }}<\u002Fdiv><\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-top:5px\"><span style=\"font:600 10.5px 'Geist Mono';background:#F2EFE8;color:#5a6f63;padding:3px 8px;border-radius:6px\">{{ t.detail }}<\u002Fspan><sc-if value=\"{{ t.hasNote }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font:600 10.5px 'Hanken Grotesk';color:#E8913A;background:#FBEFD9;padding:3px 8px;border-radius:6px\">{{ t.note }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"font:700 13px 'Hanken Grotesk';margin:16px 0 9px\">Session remarks<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <sc-for list=\"{{ sessions }}\" as=\"se\" hint-placeholder-count=\"2\">\n                  <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:12px;padding:11px 13px\">\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px\"><div style=\"font:600 12px 'Geist Mono';color:#857d70\">{{ se.date }}<\u002Fdiv><div style=\"font:600 12.5px 'Hanken Grotesk'\">{{ se.type }}<\u002Fdiv><\u002Fdiv>\n                    <div style=\"font:400 12px/1.4 'Hanken Grotesk';color:#5a6f63\">{{ se.remarks }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- DIET -->\n            <sc-if value=\"{{ dbDiet }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;gap:9px;margin-bottom:14px\">\n                <div style=\"flex:1;background:#fff;border:1px solid #ECE4D7;border-radius:13px;padding:12px;text-align:center\"><div style=\"font:700 17px 'Bricolage Grotesque';color:#14543E\">2,100<\u002Fdiv><div style=\"font:400 9.5px 'Hanken Grotesk';color:#857d70;margin-top:3px\">kcal target<\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;background:#fff;border:1px solid #ECE4D7;border-radius:13px;padding:12px;text-align:center\"><div style=\"font:700 17px 'Bricolage Grotesque';color:#14543E\">140g<\u002Fdiv><div style=\"font:400 9.5px 'Hanken Grotesk';color:#857d70;margin-top:3px\">protein<\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;background:#fff;border:1px solid #ECE4D7;border-radius:13px;padding:12px;text-align:center\"><div style=\"font:700 17px 'Bricolage Grotesque';color:#3F9D6B\">88%<\u002Fdiv><div style=\"font:400 9.5px 'Hanken Grotesk';color:#857d70;margin-top:3px\">adherence<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ reviewPlan }}\" style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;cursor:pointer\"><div style=\"font:700 13px 'Hanken Grotesk'\">Current plan · South Indian<\u002Fdiv><div style=\"font:600 11px 'Hanken Grotesk';color:#14543E\">Edit →<\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:14px\">\n                <sc-for list=\"{{ meals }}\" as=\"meal\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #ECE4D7;border-radius:12px;padding:11px 13px\">\n                    <div style=\"font:600 9.5px 'Geist Mono';color:#E8913A;width:64px;flex:none\">{{ meal.label }}<\u002Fdiv>\n                    <div style=\"flex:1;min-width:0\"><div style=\"font:600 12.5px/1.2 'Hanken Grotesk'\">{{ meal.name }}<\u002Fdiv><\u002Fdiv>\n                    <div style=\"font:600 11px 'Hanken Grotesk';color:#857d70\">{{ meal.kcal }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:9px;background:#E7F0EA;border-radius:12px;padding:11px 13px\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#14543E\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 0 1 15-6.7L21 8M21 12a9 9 0 0 1-15 6.7L3 16\"><\u002Fpath><\u002Fsvg><div style=\"font:500 11.5px 'Hanken Grotesk';color:#14543E\">3 past plans archived · history kept chronologically<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- PROGRESS -->\n            <sc-if value=\"{{ dbProgress }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:16px;padding:14px;margin-bottom:14px\">\n                <div style=\"font:700 13px 'Hanken Grotesk';margin-bottom:11px\">Add a weigh-in<\u002Fdiv>\n                <div style=\"display:flex;gap:9px;margin-bottom:11px\">\n                  <div style=\"flex:1\"><div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70;margin-bottom:4px\">Weight (kg)<\u002Fdiv><input class=\"ai\" type=\"number\" inputmode=\"decimal\" placeholder=\"77.8\" value=\"{{ wWeight }}\" oninput=\"{{ onWWeight }}\"><\u002Fdiv>\n                  <div style=\"flex:1\"><div style=\"font:500 10.5px 'Hanken Grotesk';color:#857d70;margin-bottom:4px\">Body fat (%)<\u002Fdiv><input class=\"ai\" type=\"number\" inputmode=\"decimal\" placeholder=\"24.0\" value=\"{{ wBodyFat }}\" oninput=\"{{ onWBodyFat }}\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div onclick=\"{{ addWeighIn }}\" style=\"display:flex;align-items:center;justify-content:center;gap:7px;background:#14543E;color:#fff;border-radius:11px;padding:12px;font:700 13px 'Hanken Grotesk';cursor:pointer\" style-hover=\"background:#0F4733\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>Save entry<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font:700 13px 'Hanken Grotesk';margin-bottom:9px\">History<\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;overflow:hidden;margin-bottom:14px\">\n                <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:9px 13px;background:#F7F4EE;border-bottom:1px solid #EFE9DD\"><div style=\"font:600 10px 'Geist Mono';color:#857d70\">DATE<\u002Fdiv><div style=\"font:600 10px 'Geist Mono';color:#857d70\">WEIGHT<\u002Fdiv><div style=\"font:600 10px 'Geist Mono';color:#857d70\">FAT<\u002Fdiv><div style=\"font:600 10px 'Geist Mono';color:#857d70\">MUSCLE<\u002Fdiv><\u002Fdiv>\n                <sc-for list=\"{{ progressRows }}\" as=\"p\" hint-placeholder-count=\"3\">\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:11px 13px;border-bottom:1px solid #F3EEE3\"><div style=\"font:600 12px 'Hanken Grotesk'\">{{ p.date }}<\u002Fdiv><div style=\"font:500 12px 'Hanken Grotesk';color:#5a6f63\">{{ p.weight }}<\u002Fdiv><div style=\"font:500 12px 'Hanken Grotesk';color:#5a6f63\">{{ p.bodyFat }}<\u002Fdiv><div style=\"font:500 12px 'Hanken Grotesk';color:#5a6f63\">{{ p.muscle }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"font:700 13px 'Hanken Grotesk';margin-bottom:9px\">Measurements (cm)<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px\">\n                <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:12px;padding:11px;text-align:center\"><div style=\"font:700 15px 'Bricolage Grotesque';color:#14543E\">{{ mChest }}<\u002Fdiv><div style=\"font:400 9.5px 'Hanken Grotesk';color:#857d70;margin-top:2px\">Chest<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:12px;padding:11px;text-align:center\"><div style=\"font:700 15px 'Bricolage Grotesque';color:#14543E\">{{ mWaist }}<\u002Fdiv><div style=\"font:400 9.5px 'Hanken Grotesk';color:#857d70;margin-top:2px\">Waist<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:12px;padding:11px;text-align:center\"><div style=\"font:700 15px 'Bricolage Grotesque';color:#14543E\">{{ mArms }}<\u002Fdiv><div style=\"font:400 9.5px 'Hanken Grotesk';color:#857d70;margin-top:2px\">Arms<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:12px;padding:11px;text-align:center\"><div style=\"font:700 15px 'Bricolage Grotesque';color:#14543E\">{{ mThighs }}<\u002Fdiv><div style=\"font:400 9.5px 'Hanken Grotesk';color:#857d70;margin-top:2px\">Thighs<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ACTIVITY / WEARABLES -->\n            <sc-if value=\"{{ dbActivity }}\" hint-placeholder-val=\"{{ false }}\">\n              <sc-if value=\"{{ wearConnected }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:#14543E;color:#F4EFE6;border-radius:16px;padding:15px;margin-bottom:14px\">\n                  <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:13px\"><div style=\"width:9px;height:9px;border-radius:50%;background:#7DD8A6;animation:aaPulse 1.6s infinite\"><\u002Fdiv><div style=\"font:600 13px 'Hanken Grotesk'\">{{ wearProvider }} connected<\u002Fdiv><div onclick=\"{{ disconnectWearable }}\" style=\"margin-left:auto;font:600 11px 'Hanken Grotesk';color:#F4CF9F;cursor:pointer\">Disconnect<\u002Fdiv><\u002Fdiv>\n                  <div style=\"display:flex;gap:9px\">\n                    <div style=\"flex:1;background:rgba(244,239,230,.1);border-radius:12px;padding:10px\"><div style=\"font:700 17px 'Bricolage Grotesque'\">{{ actTotalSteps }}<\u002Fdiv><div style=\"font:400 10px 'Hanken Grotesk';color:#A9C6B5;margin-top:2px\">total steps<\u002Fdiv><\u002Fdiv>\n                    <div style=\"flex:1;background:rgba(244,239,230,.1);border-radius:12px;padding:10px\"><div style=\"font:700 17px 'Bricolage Grotesque'\">{{ actTotalKcal }}<\u002Fdiv><div style=\"font:400 10px 'Hanken Grotesk';color:#A9C6B5;margin-top:2px\">kcal burned<\u002Fdiv><\u002Fdiv>\n                    <div onclick=\"{{ syncNow }}\" style=\"flex:none;display:flex;align-items:center;gap:6px;background:#E8913A;color:#0F4733;border-radius:12px;padding:0 14px;font:700 12px 'Hanken Grotesk';cursor:pointer\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0F4733\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 0 1 15-6.7L21 8M21 12a9 9 0 0 1-15 6.7L3 16\"><\u002Fpath><\u002Fsvg>Sync<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font:700 13px 'Hanken Grotesk';margin-bottom:9px\">Daily activity history<\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:14px;overflow:hidden\">\n                  <div style=\"display:grid;grid-template-columns:.8fr 1fr .9fr .9fr .9fr;padding:9px 12px;background:#F7F4EE;border-bottom:1px solid #EFE9DD\"><div style=\"font:600 9px 'Geist Mono';color:#857d70\">DATE<\u002Fdiv><div style=\"font:600 9px 'Geist Mono';color:#857d70\">STEPS<\u002Fdiv><div style=\"font:600 9px 'Geist Mono';color:#857d70\">KCAL<\u002Fdiv><div style=\"font:600 9px 'Geist Mono';color:#857d70\">DIST<\u002Fdiv><div style=\"font:600 9px 'Geist Mono';color:#857d70\">HR<\u002Fdiv><\u002Fdiv>\n                  <sc-for list=\"{{ actDays }}\" as=\"x\" hint-placeholder-count=\"5\">\n                    <div style=\"display:grid;grid-template-columns:.8fr 1fr .9fr .9fr .9fr;padding:10px 12px;border-bottom:1px solid #F3EEE3;align-items:center\"><div style=\"font:600 11px 'Hanken Grotesk'\">{{ x.date }}<\u002Fdiv><div style=\"font:500 11px 'Hanken Grotesk';color:#5a6f63\">{{ x.steps }}<\u002Fdiv><div style=\"font:500 11px 'Hanken Grotesk';color:#5a6f63\">{{ x.kcal }}<\u002Fdiv><div style=\"font:500 11px 'Hanken Grotesk';color:#5a6f63\">{{ x.dist }}<\u002Fdiv><div style=\"font:500 11px 'Hanken Grotesk';color:#5a6f63\">{{ x.hr }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ wearShowConnect }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:16px;padding:15px;margin-bottom:14px\">\n                  <div style=\"font:700 14px 'Hanken Grotesk';margin-bottom:5px\">Connect a wearable<\u002Fdiv>\n                  <div style=\"font:400 11.5px/1.45 'Hanken Grotesk';color:#857d70;margin-bottom:13px\">Securely sync steps, calories, distance, active minutes &amp; heart rate. You control consent and can disconnect anytime.<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:9px\">\n                    <sc-for list=\"{{ providers }}\" as=\"pr\" hint-placeholder-count=\"3\">\n                      <div onclick=\"{{ pr.onConnect }}\" style=\"display:flex;align-items:center;gap:11px;border:1px solid #ECE4D7;border-radius:12px;padding:12px 13px;cursor:pointer\" style-hover=\"border-color:#14543E;background:#FBFAF5\">\n                        <div style=\"width:34px;height:34px;border-radius:10px;background:#E7F0EA;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#14543E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"6\" y=\"7\" width=\"12\" height=\"10\" rx=\"3\"><\u002Frect><path d=\"M9 7l1-3h4l1 3M9 17l1 3h4l1-3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                        <div style=\"flex:1\"><div style=\"font:600 13px 'Hanken Grotesk'\">{{ pr.name }}<\u002Fdiv><div style=\"font:400 10.5px 'Geist Mono';color:#857d70;margin-top:2px\">{{ pr.api }}<\u002Fdiv><\u002Fdiv>\n                        <div style=\"font:600 11px 'Hanken Grotesk';color:#14543E;background:#E7F0EA;padding:6px 12px;border-radius:999px\">Connect<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:7px;margin-top:12px;font:400 10.5px 'Hanken Grotesk';color:#857d70\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#857d70\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"10\" width=\"16\" height=\"10\" rx=\"2\"><\u002Frect><path d=\"M8 10V7a4 4 0 0 1 8 0v3\"><\u002Fpath><\u002Fsvg>End-to-end encrypted · stored against this client only<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ ADD EXERCISE / WORKOUT BUILDER (trainer) ============ -->\n      <sc-if value=\"{{ isAddEx }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"scr\">\n          <div style=\"padding:54px 18px 15px;background:#14543E;color:#F4EFE6;border-radius:0 0 22px 22px\">\n            <div onclick=\"{{ backToClient }}\" style=\"display:flex;align-items:center;gap:12px;margin-bottom:13px;cursor:pointer\">\n              <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F4EFE6\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 5l-7 7 7 7\"><\u002Fpath><\u002Fsvg>\n              <div style=\"font:600 13px 'Hanken Grotesk';color:#A9C6B5\">Build workout · Arjun K.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font:700 19px/1.2 'Bricolage Grotesque'\">Organise by day<\u002Fdiv>\n            <div style=\"display:flex;gap:7px;margin-top:12px;overflow:auto\">\n              <sc-for list=\"{{ buildDays }}\" as=\"bd\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ bd.onPick }}\" style=\"flex:none;display:flex;flex-direction:column;gap:2px;padding:8px 13px;border-radius:11px;cursor:pointer;background:{{ bd.pillBg }};border:1px solid {{ bd.pillBorder }}\"><div style=\"font:600 12.5px 'Hanken Grotesk';color:{{ bd.pillColor }}\">{{ bd.name }}<\u002Fdiv><div style=\"font:400 9.5px 'Hanken Grotesk';color:{{ bd.pillSub }}\">{{ bd.count }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:15px 16px 120px\">\n            <div style=\"font:700 13px 'Hanken Grotesk';margin-bottom:9px\">{{ activeDayName }} · exercises<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:16px\">\n              <sc-for list=\"{{ activeExercises }}\" as=\"ex\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #ECE4D7;border-radius:13px;padding:11px 13px\">\n                  <div style=\"width:26px;height:26px;border-radius:8px;background:#D9E6DE;color:#14543E;display:flex;align-items:center;justify-content:center;font:700 11px 'Bricolage Grotesque';flex:none\">{{ ex.idx }}<\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\"><div style=\"font:600 13px/1.2 'Hanken Grotesk'\">{{ ex.name }}<\u002Fdiv><div style=\"font:400 10.5px 'Hanken Grotesk';color:#857d70;margin-top:2px\">{{ ex.detail }}<\u002Fdiv><\u002Fdiv>\n                  <div onclick=\"{{ ex.onRemove }}\" style=\"cursor:pointer;flex:none;padding:4px\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C0492B\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <!-- add exercise form -->\n            <div style=\"background:#fff;border:1px solid #ECE4D7;border-radius:16px;padding:15px\">\n              <div style=\"font:700 13px 'Hanken Grotesk';margin-bottom:11px\">Add an ecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 10.5 12 3l9 7.5\"><\u002Fpath><path d=\"M5 9v11h14V9\"><\u002Fpath><\u002Fsvg><div style=\"font:600 9.5px 'Hanken Grotesk'\">Home<\u002Fdiv><\u002Fdiv>\n          <div onclick=\"{{ goTrain }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:{{ ctabTrain }}\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6.5 6.5 17.5 17.5\"><\u002Fpath><path d=\"m4 9-1.5 1.5a2 2 0 0 0 0 3L4 15M20 9l1.5 1.5a2 2 0 0 1 0 3L20 15\"><\u002Fpath><\u002Fsvg><div style=\"font:600 9.5px 'Hanken Grotesk'\">Train<\u002Fdiv><\u002Fdiv>\n          <div onclick=\"{{ goCFuel }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:{{ ctabFuel }}\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 11h16a8 8 0 0 1-16 0Z\"><\u002Fpath><path d=\"M12 11V5\"><\u002Fpath><path d=\"M9 5h6\"><\u002Fpath><\u002Fsvg><div style=\"font:600 9.5px 'Hanken Grotesk'\">Fuel<\u002Fdiv><\u002Fdiv>\n          <div onclick=\"{{ goCBody }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:{{ ctabBody }}\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"5\" r=\"2.4\"><\u002Fcircle><path d=\"M12 8v7M12 15l-4 6M12 15l4 6M7 11h10\"><\u002Fpath><\u002Fsvg><div style=\"font:600 9.5px 'Hanken Grotesk'\">Body<\u002Fdiv><\u002Fdiv>\n          <div onclick=\"{{ goCCommunity }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:{{ ctabCommunity }}\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"9\" cy=\"8\" r=\"3\"><\u002Fcircle><path d=\"M3 20c0-3 2.7-5 6-5s6 2 6 5\"><\u002Fpath><path d=\"M16 8.5a3 3 0 0 1 0 5M18 20c0-2.2-.9-3.7-2.3-4.4\"><\u002Fpath><\u002Fsvg><div style=\"font:600 9.5px 'Hanken Grotesk'\">Community<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ TOAST ============ -->\n      <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;left:50%;bottom:104px;transform:translateX(-50%);display:flex;align-items:center;gap:9px;background:#0F2C20;color:#F4EFE6;padding:12px 16px;border-radius:13px;box-shadow:0 12px 30px -8px rgba(0,0,0,.5);animation:aaToast 2.6s ease forwards;max-width:330px;z-index:70\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7DD8A6\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <div style=\"font:600 12.5px/1.3 'Hanken Grotesk'\">{{ toast }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900}}\">\nconst LS_KEY = 'aarogya:data:v3';\n\nclass Component extends DCLogic {\n  MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n\n  defaults() {\n    return {\n      __v: 3,\n      role: 'trainer',\n      clientApp: {\n        readiness: { score: 82, hrv: 68, restHr: 54, sleep: 7.4, load: 'Moderate', recovery: 'Primed' },\n        nutrition: { glp1: false, cycleAware: false },\n        community: { points: 1240, rank: 3, streak: 12 },\n        mind: { mood: null, longevityAge: 29, meditation: 18 },\n      },\n      program: { lengthDays: 84, currentDay: 38, startISO: '2026-05-18' },\n      inbox: { plan: true, nudge: true, deload: true },\n      nudgeTone: 'strict',\n      notifications: [\n        { id: 'seed1', ts: Date.now() - 2 * 3600 * 1000, type: 'gym-entry', client: 'Karthik Rao', session: 'Leg Day · 5 exercises · 16:00', read: true, dupes: 0 },\n      ],\n      meals: [\n        { id:'b', slot:'breakfast', label:'BREAKFAST · 7:30', name:'2 Idli + sambar + coconut chutney', sub:'+ 1 boiled egg white · filter coffee', kcal:430, protein:28, altIdx:-1 },\n        { id:'l', slot:'lunch', label:'LUNCH · 13:00', name:'Brown rice + sambar + beans poriyal', sub:'+ 1 cup low-fat curd · cucumber salad', kcal:660, protein:38, altIdx:-1 },\n        { id:'s', slot:'snack', label:'SNACK · 17:00', name:'Sundal (chickpea) + buttermilk', sub:'Nut-free · high protein', kcal:280, protein:26, altIdx:-1 },\n        { id:'d', slot:'dinner', label:'DINNER · 20:30', name:'3 Ragi dosa + tomato chutney + paneer bhurji', sub:'Low oil · slow carbs', kcal:720, protein:48, altIdx:-1 },\n      ],\n      client: {\n        id:'arjun', name:'Arjun Kumar', initials:'AK', age:32, city:'Bengaluru',\n        goal:'Fat loss', diet:'South Indian veg', restrictions:'No nuts',\n        membership: { plan:'Quarterly Pro', startISO:'2026-05-18', endISO:'2026-08-18', renewal:'Active', sessionsTotal:36, sessionsUsed:14,\n          attendance:[ {dateISO:'2026-06-27',present:true},{dateISO:'2026-06-25',present:true},{dateISO:'2026-06-23',present:false},{dateISO:'2026-06-20',present:true},{dateISO:'2026-06-18',present:true} ] },\n        progress: [\n          {dateISO:'2026-05-18', weight:80.5, bodyFat:26.4, muscle:32.5},\n          {dateISO:'2026-06-08', weight:79.2, bodyFat:25.3, muscle:32.8},\n          {dateISO:'2026-06-22', weight:78.4, bodyFat:24.6, muscle:33.1},\n        ],\n        measurements: { chest:'102', waist:'88', arms:'35', thighs:'58' },\n        sessions: [\n          {dateISO:'2026-06-27', type:'Push Day', remarks:'Bench +2.5kg, strong form throughout'},\n          {dateISO:'2026-06-25', type:'Pull Day', remarks:'Slight lower-back fatigue, watch deadlift'},\n        ],\n        trainingLogs: [\n          {dateISO:'2026-06-27', exercise:'Barbell bench press', detail:'4×8 · 72.5 kg', note:'New PR'},\n          {dateISO:'2026-06-25', exercise:'Deadlift', detail:'3×5 · 110 kg', note:''},\n        ],\n        activity: { provider:null, consent:false, days:[] },\n      },\n      workout: {\n        activeDayId: 'push',\n        days: [\n          { id:'push', name:'Push Day', exercises:[\n            {id:'e1', name:'Barbell bench press', sets:4, reps:8, weight:'72.5 kg', rest:'90s', note:'Tempo 2-1-2', done:false},\n            {id:'e2', name:'Incline dumbbell press', sets:3, reps:10, weight:'24 kg', rest:'75s', note:'', done:false},\n            {id:'e3', name:'Cable fly', sets:3, reps:12, weight:'15 kg', rest:'60s', note:'Squeeze at top', done:false},\n            {id:'e4', name:'Overhead press', sets:4, reps:8, weight:'40 kg', rest:'90s', note:'', done:false},\n          ]},\n          { id:'pull', name:'Pull Day', exercises:[\n            {id:'e5', name:'Deadlift', sets:3, reps:5, weight:'110 kg', rest:'120s', note:'Reset each rep', done:false},\n            {id:'e6', name:'Lat pulldown', sets:3, reps:12, weight:'55 kg', rest:'75s', note:'', done:false},\n          ]},\n          { id:'legs', name:'Leg Day', exercises:[\n            {id:'e7', name:'Back squat', sets:4, reps:8, weight:'90 kg', rest:'120s', note:'', done:false},\n            {id:'e8', name:'Leg press', sets:3, reps:12, weight:'160 kg', rest:'90s', note:'', done:false},\n          ]},\n        ],\n      },\n    };\n  }\n\n  ALTS = {\n    breakfast: [\n      { name:'Pesarattu + ginger chutney', sub:'Moong dal crepe · high protein', kcal:410, protein:30 },\n      { name:'Ragi semiya upma + egg whites', sub:'Millet vermicelli', kcal:450, protein:34 },\n      { name:'Veg rava upma + curd', sub:'Lighter option', kcal:400, protein:18 },\n    ],\n    lunch: [\n      { name:'Millet bisi bele bath + curd', sub:'Fibre-rich one-pot', kcal:620, protein:34 },\n      { name:'Curd rice + chana + salad', sub:'Gut-friendly, lighter', kcal:580, protein:32 },\n      { name:'2 Phulka + dal + paneer curry', sub:'Higher protein', kcal:700, protein:46 },\n    ],\n    snack: [\n      { name:'Roasted chana + sprouts', sub:'Crunchy, low cal', kcal:240, protein:22 },\n      { name:'Greek curd + fruit', sub:'Protein + micros', kcal:260, protein:24 },\n    ],\n    dinner: [\n      { name:'2 Adai + avial', sub:'Mixed-lentil crepe', kcal:680, protein:40 },\n      { name:'Tofu + veg stir-fry + 2 phulka', sub:'Highest protein', kcal:700, protein:50 },\n      { name:'Veg millet khichdi + curd', sub:'Light, easy digest', kcal:640, protein:34 },\n    ],\n  };\n\n  MEAL_ORIG = {\n    b:{name:'2 Idli + sambar + coconut chutney', sub:'+ 1 boiled egg white · filter coffee', kcal:430, protein:28},\n    l:{name:'Brown rice + sambar + beans poriyal', sub:'+ 1 cup low-fat curd · cucumber salad', kcal:660, protein:38},\n    s:{name:'Sundal (chickpea) + buttermilk', sub:'Nut-free · high protein', kcal:280, protein:26},\n    d:{name:'3 Ragi dosa + tomato chutney + paneer bhurji', sub:'Low oil · slow carbs', kcal:720, protein:48},\n  };\n\n  TONE_TEXT = {\n    strict: '\"You just walked into CTR Tiffins. Your weekly calorie budget is limited — going over today may make it harder to stay on track this week. Stick to 1 plain dosa, skip the butter. You\\u2019ve got this. \\uD83D\\uDCAA\"',\n    gentle: '\"Hey Meera! \\uD83D\\uDE0A You\\u2019re near CTR Tiffins. If you\\u2019re eating here, a plain dosa with sambar is a lovely choice that fits your day nicely. No pressure at all — you\\u2019ve had a great week!\"',\n    balanced: '\"You\\u2019re at CTR Tiffins. You\\u2019ve got about 520 kcal left in today\\u2019s budget — a plain dosa and sambar fits comfortably. Enjoy it mindfully and you\\u2019ll stay right on track.\"',\n  };\n\n  state = {\n    route: 'home', dbTab: 'membership', banner: null, toast: null,\n    exForm: { name:'', sets:'4', reps:'8', weight:'', rest:'90s', note:'' },\n    wForm: { weight:'', bodyFat:'' },\n    data: this.load(),\n  };\n\n  load() {\n    const def = this.defaults();\n    try { const raw = localStorage.getItem(LS_KEY); if (raw) { const p = JSON.parse(raw); if (p && p.__v === 3) return { ...def, ...p, role: p.role || def.role, clientApp: p.clientApp || def.clientApp }; } } catch (e) {}\n    return def;\n  }\n  persist(data) { try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {} }\n  mut(fn) { const data = JSON.parse(JSON.stringify(this.state.data)); fn(data); this.setState({ data }); this.persist(data); }\n\n  _toastTimer = null;\n  showToast(msg) { if (this._toastTimer) clearTimeout(this._toastTimer); this.setState({ toast: msg }); this._toastTimer = setTimeout(() => this.setState({ toast: null }), 2500); }\n\n  fmt(iso) { if (!iso) return ''; const p = iso.split('-'); return parseInt(p[2], 10) + ' ' + this.MONTHS[parseInt(p[1], 10) - 1]; }\n  fmtFull(iso) { if (!iso) return ''; const p = iso.split('-'); return parseInt(p[2], 10) + ' ' + this.MONTHS[parseInt(p[1], 10) - 1] + \" '\" + p[0].slice(2); }\n  addDaysISO(iso, days) { const dt = new Date(iso + 'T00:00:00'); dt.setDate(dt.getDate() + days); return dt.toISOString().slice(0, 10); }\n  todayISO() { return new Date().toISOString().slice(0, 10); }\n  rel(ts) { const s = (Date.now() - ts) / 1000; if (s < 60) return 'just now'; if (s < 3600) return Math.floor(s / 60) + 'm ago'; if (s < 86400) return Math.floor(s / 3600) + 'h ago'; return Math.floor(s / 86400) + 'd ago'; }\n  timeOf(ts) { const d = new Date(ts); let h = d.getHours(), m = d.getMinutes(); const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ap; }\n\n  go(route) { this.setState({ route }); }\n\n  // ---- gym entry ----\n  simulate(name, session) {\n    const now = Date.now();\n    let suppressed = false;\n    this.mut(d => {\n      const recent = d.notifications.find(n => n.type === 'gym-entry' && n.client === name && (now - (n.lastTs || n.ts)) < 5 * 60 * 1000);\n      if (recent) { recent.dupes = (recent.dupes || 0) + 1; recent.lastTs = now; suppressed = true; }\n      else { d.notifications.unshift({ id: 'n' + now, ts: now, type: 'gym-entry', client: name, session, read: false, dupes: 0 }); }\n    });\n    if (suppressed) { this.showToast(name + ' already checked in — duplicate suppressed (5-min window)'); }\n    else {\n      this.setState({ banner: { client: name, session, ts: now } });\n      this.showToast(name + ' just entered the gym');\n      setTimeout(() => this.setState(s => (s.banner && s.banner.client === name) ? { banner: null } : null), 6000);\n    }\n  }\n  simArjun = () => this.simulate('Arjun Kumar', 'Push Day · 6 exercises · 7:00 AM');\n  simMeera = () => this.simulate('Meera Suresh', 'Check-in call · no session booked');\n  dismissBanner = (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.setState({ banner: null }); };\n  markAllRead = () => { this.mut(d => d.notifications.forEach(n => n.read = true)); this.showToast('All notifications marked read'); };\n  clearNotifs = () => { this.mut(d => d.notifications = []); this.showToast('Notifications cleared'); };\n\n  // ---- diet ----\n  swapMeal(id) {\n    this.mut(d => {\n      const m = d.meals.find(x => x.id === id); if (!m) return;\n      const alts = this.ALTS[m.slot] || []; const next = m.altIdx + 1;\n      if (next >= alts.length) { const o = this.MEAL_ORIG[id]; Object.assign(m, { name:o.name, sub:o.sub, kcal:o.kcal, protein:o.protein, altIdx:-1 }); }\n      else { const a = alts[next]; Object.assign(m, { name:a.name, sub:a.sub, kcal:a.kcal, protein:a.protein, altIdx:next }); }\n    });\n    this.showToast('Meal swapped — macros updated');\n  }\n  approve = () => { this.mut(d => d.inbox.plan = false); this.go('home'); this.showToast('Plan approved & sent to Arjun \\u2713'); };\n\n  // ---- nu
